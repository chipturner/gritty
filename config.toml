# gritty configuration file
# Linux: ~/.config/gritty/config.toml (honors $XDG_CONFIG_HOME)
# macOS: ~/Library/Application Support/gritty/config.toml
# `gritty config` opens it at the right path; `gritty info` prints it.
#
# All settings are optional. CLI flags always take priority.
# Precedence: CLI flag > [host.<name>] > [defaults] > built-in default.

# Global defaults for all sessions and tunnels.
[defaults]
# forward-agent = false
# forward-open = true
# no-escape = false
# oauth-redirect = true
# oauth-timeout = 180
# heartbeat-interval = 10
# heartbeat-timeout = 60
# ring-buffer-size = 1048576
# oauth-tunnel-idle-timeout = 5
# linger = "never"           # auto-reap a session this long after the last
#                            # client detaches (e.g. "30m", "1h"); applies to
#                            # sessions you explicitly named (`host:foo`)
# linger-unnamed = "never"   # same, for auto-numbered sessions (`host` with
#                            # no name); falls back to `linger` if unset
# client-name = "my-laptop"  # default: hostname

# Tunnel-specific global defaults (for tunnel-create).
[defaults.tunnel]
# ssh-options = []
# no-server-start = false
# isolate-control-path = true   # default; forces ControlPath=none on the tunnel ssh. Set false to ride an existing ControlMaster mux.
# connect-timeout = 30          # ssh -o ConnectTimeout (seconds); 0 = defer to ssh_config

# Per-host overrides, keyed by connection name.
# Connection name = hostname from destination, or -n <name> override.
#
# aliases: alternate names for this connection. Typing an alias as the host
# part of any target resolves to the canonical name, so `gritty c devbox` and
# `gritty c devbox.example.com` address the same tunnel. The FIRST alias is
# also the SSH destination used when no tunnel exists yet.
#
# [host.devbox]
# aliases = ["devbox.example.com"]
#
# [host.devbox.tunnel]
# ssh-options = ["IdentityFile=~/.ssh/devbox_key"]
#
# [host.prod]
# forward-agent = false
# forward-open = false
# no-escape = true
#
# [host.prod.tunnel]
# no-server-start = true
