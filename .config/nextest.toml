[test-groups.pty-tests]
max-threads = 2

[test-groups.serial]
max-threads = 1

[[profile.default.overrides]]
filter = 'binary(e2e_test) | binary(daemon_test)'
test-group = 'pty-tests'
retries = 2

# Spawns real self-daemonized `gritty server` processes; same group + retry
# policy as the other process-heavy suites.
[[profile.default.overrides]]
filter = 'binary(procscan_test)'
test-group = 'pty-tests'
retries = 2

[[profile.default.overrides]]
filter = 'binary(socat_tunnel_test) | binary(socat_bridge_test)'
test-group = 'serial'
retries = 2

[[profile.default.overrides]]
filter = 'binary(protocol_proptest)'
retries = 0
