name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@nextest

      - name: Format
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo nextest run --locked

  socat-tunnel:
    name: Socat Tunnel Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@nextest

      - name: Install socat
        run: sudo apt-get update && sudo apt-get install -y socat

      - name: Build
        run: cargo build

      - name: Socat tunnel tests
        run: cargo nextest run --test socat_tunnel_test -j 1

  container-tests:
    name: Container Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build

      - name: Container tests
        run: |
          docker build -t gritty-container-test -f tests/container/Dockerfile .
          docker run --rm gritty-container-test

  msrv:
    name: MSRV (1.94)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.100.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --locked

  socat-bridge:
    name: Socat Bridge Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@nextest

      - name: Install socat
        run: sudo apt-get update && sudo apt-get install -y socat

      - name: Build
        run: cargo build

      - name: Socat bridge tests
        run: cargo nextest run --test socat_bridge_test -j 1
