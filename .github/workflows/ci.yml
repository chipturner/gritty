name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@nextest

      - name: Format
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo nextest run --locked

  socat-tunnel:
    name: Socat Tunnel Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@nextest

      - name: Install socat
        run: sudo apt-get update && sudo apt-get install -y socat

      - name: Build
        run: cargo build

      - name: Socat tunnel tests
        run: cargo nextest run --test socat_tunnel_test -j 1

  container-tests:
    name: Container Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build

      - name: Container tests
        timeout-minutes: 10
        run: |
          docker build -t gritty-container-test -f tests/container/Dockerfile .
          timeout 480 docker run --rm gritty-container-test

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --locked

  musl-build:
    name: Musl Release Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        target: [x86_64-unknown-linux-musl, aarch64-unknown-linux-musl]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      - uses: taiki-e/install-action@nextest
        if: matrix.target == 'x86_64-unknown-linux-musl'

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      # Released Linux binaries are musl; run the suite against that libc.
      # x86_64 only -- it executes natively on the runner (aarch64 would
      # need QEMU, whose PTY timing is too flaky for this suite).
      - name: Test (musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: cargo nextest run --locked --target ${{ matrix.target }}

      - name: Verify static linkage
        run: |
          bin="target/${{ matrix.target }}/release/gritty"
          file "$bin"
          # Accept both 'statically linked' and 'static-pie linked' -- recent
          # musl toolchains produce static-pie binaries by default, which are
          # still fully self-contained (no dynamic loader required).
          file "$bin" | grep -qE 'statically linked|static-pie linked' || {
            echo "error: $bin is not statically linked" >&2
            exit 1
          }

  socat-bridge:
    name: Socat Bridge Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@nextest

      - name: Install socat
        run: sudo apt-get update && sudo apt-get install -y socat

      - name: Build
        run: cargo build

      - name: Socat bridge tests
        run: cargo nextest run --test socat_bridge_test -j 1
